<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Impostor - Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }

<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

        <div class="space-y-6">

            <div class="relative flex py-5 items-center">

                <div class="flex-grow border-t border-gray-700"></div>
            </div>

            <a href="host.html" class="block w-full bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white font-bold py-5 px-6 rounded-xl shadow-lg transform transition hover:scale-105 text-xl">
